version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ekip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ekip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ekip_password}
      POSTGRES_DB: ${POSTGRES_DB:-ekip_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ekip}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ekip-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: ekip-backend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - ../.env
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  qdrant_data:
